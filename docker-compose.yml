services:
  web:
    build: .
    container_name: cyberdu_app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             echo '========================================' &&
             echo 'САЙТ ДОСТУПЕН ПО ССЫЛКЕ:' &&
             echo 'http://localhost:8080' &&
             echo '========================================' &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    ports:
      - "8080:8000"